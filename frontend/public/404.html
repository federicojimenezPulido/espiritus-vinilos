<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No encontramos eso — En Las Nubes Trepao</title>
  <link rel="icon" type="image/jpeg" href="/logo-enlt.jpeg" />
  <!-- Archivo standalone — no depende del bundle JS principal -->
  <style>
    /* Colores confirmados desde index.css: --bg #0a0a0a, --text #f0f0f0 */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 480px;
      text-align: center;
      line-height: 1.8;
    }
    p { margin-bottom: 1.2rem; color: #999; }
    a {
      color: #f0f0f0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .back {
      display: inline-block;
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>
<body>
  <main>
    <p>Este lado del disco está en blanco.</p>
    <p>
      Encontranos en <a href="https://www.instagram.com/enlasnubestrepao">@enlasnubestrepao</a>
    </p>
    <a href="/" class="back">Volver al inicio</a>
  </main>
</body>
</html>
